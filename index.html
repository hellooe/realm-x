<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realm 规则生成器</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --success-hover: #059669;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --warning: #f59e0b;
            --warning-hover: #d97706;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --input-bg: #ffffff;
            --input-border: #cbd5e1;
            --input-focus: rgba(37, 99, 235, 0.15);
            --rule-bg: #f8fafc;
            --rule-hover: #f1f5f9;
            --radius-lg: 16px;
            --radius-md: 10px;
            --radius-sm: 6px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --terminal-bg: #0f172a;
            --terminal-border: #1e293b;
            --terminal-header: #1e293b;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --input-bg: #1e293b;
            --input-border: #475569;
            --input-focus: rgba(37, 99, 235, 0.3);
            --rule-bg: #1e293b;
            --rule-hover: #1e293b;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            --terminal-bg: #020617;
            --terminal-border: #334155;
            --terminal-header: #0f172a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); padding: 40px 20px; color: var(--text); line-height: 1.5; transition: background-color 0.3s, color 0.3s; }
        
        .container { max-width: 950px; margin: 0 auto; background: var(--card-bg); border-radius: var(--radius-lg); padding: 35px 40px; box-shadow: var(--shadow); border: 1px solid var(--border); transition: var(--transition); }
        
        .header-area { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; flex-wrap: wrap; gap: 16px; }
        h1 { font-size: 28px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .sub { color: var(--text-muted); font-size: 14px; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        
        .section { background: var(--card-bg); border-radius: var(--radius-md); padding: 24px; margin-bottom: 24px; border: 1px solid var(--border); transition: var(--transition); }
        .section:hover { border-color: #cbd5e1; }
        [data-theme="dark"] .section:hover { border-color: #475569; }
        .section-title { font-weight: 600; font-size: 16px; margin-bottom: 18px; display: flex; align-items: center; justify-content: space-between; letter-spacing: 0.5px; }
        .section-title span { display: flex; align-items: center; gap: 8px; }

        .form-row { display: flex; flex-wrap: wrap; align-items: center; gap: 16px 24px; margin-bottom: 12px; }
        .form-row label { display: flex; align-items: center; gap: 8px; font-weight: 500; font-size: 14px; color: var(--text-muted); cursor: pointer; user-select: none; }
        
        input[type="text"], select, textarea { padding: 8px 14px; border: 1px solid var(--input-border); border-radius: var(--radius-sm); font-size: 14px; color: var(--text); background-color: var(--input-bg); outline: none; transition: var(--transition); width: 100%; }
        input[type="text"]:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--input-focus); }
        input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }
        
        /* 错误验证状态标红 */
        input.invalid-field, select.invalid-field { border-color: var(--danger) !important; background-color: rgba(239, 68, 68, 0.05) !important; box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.15) !important; }

        /* 规则卡片设计 */
        .rule-item { background: var(--rule-bg); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 20px; margin-bottom: 16px; position: relative; transition: var(--transition); display: flex; flex-direction: column; }
        [data-theme="light"] .rule-item:hover { border-color: #cbd5e1; background: var(--rule-hover); }
        
        .rule-fields { display: flex; flex-wrap: wrap; gap: 16px 24px; align-items: center; }
        .rule-group { display: flex; align-items: center; gap: 10px; }
        .rule-group .addr-label { font-weight: 600; font-size: 13px; color: var(--text-muted); width: 34px; text-align: right; }
        
        /* 联合输入框组 */
        .input-combined { display: flex; align-items: center; border: 1px solid var(--input-border); border-radius: var(--radius-sm); background: var(--input-bg); overflow: hidden; transition: var(--transition); }
        .input-combined:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px var(--input-focus); }
        .input-combined input { border: none !important; padding: 8px 12px; border-radius: 0 !important; box-shadow: none !important; background: transparent; color: var(--text); }
        .input-combined input.addr-field { width: 150px; }
        .input-combined input.port-field { width: 85px; text-align: center; border-left: 1px solid var(--border) !important; background: rgba(0,0,0,0.02); color: #0284c7; font-weight: 500; }
        [data-theme="dark"] .input-combined input.port-field { color: #38bdf8; background: rgba(255,255,255,0.02); }

        /* 额外远程样式 */
        .extra-remotes { margin-top: 14px; padding-top: 12px; padding-left: 14px; border-left: 3px solid var(--border); }
        .extra-item-container { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
        .extra-item { display: flex; align-items: center; gap: 10px; }
        .extra-item .input-combined input.addr-field { width: 140px; }
        .extra-item .input-combined input.port-field { width: 80px; }
        
        /* 负载均衡配置 */
        .bal-container { display: flex; align-items: center; gap: 12px; margin-top: 12px; background: var(--input-bg); padding: 10px 14px; border-radius: var(--radius-sm); border: 1px dashed var(--border); font-size: 13px; width: max-content; flex-wrap: wrap; }
        .bal-container label { font-weight: 500; color: var(--text-muted); }
        .bal-container select { width: 130px; padding: 4px 8px; font-size: 13px; }
        .bal-container input { width: 110px; padding: 4px 8px; font-size: 13px; text-align: center; }

        /* 按钮体系 */
        .btn { padding: 8px 16px; border: none; border-radius: var(--radius-sm); font-weight: 500; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: var(--transition); user-select: none; text-decoration: none; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-secondary { background: var(--border); color: var(--text); }
        .btn-secondary:hover { background: rgba(0,0,0,0.1); }
        [data-theme="dark"] .btn-secondary:hover { background: rgba(255,255,255,0.1); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { background: var(--danger-hover); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { background: var(--success-hover); }
        .btn-warning { background: var(--warning); color: #fff; }
        .btn-warning:hover { background: var(--warning-hover); }
        .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 4px; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; }
        
        .rule-item .del-rule { align-self: flex-end; background: rgba(239, 68, 68, 0.1); border: none; color: var(--danger); border-radius: var(--radius-sm); padding: 5px 14px; cursor: pointer; font-size: 12px; font-weight: 500; margin-top: 14px; transition: var(--transition); }
        .rule-item .del-rule:hover { background: var(--danger); color: #fff; }
        .del-extra-btn { background: var(--border); border: none; color: var(--text-muted); font-size: 12px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; transition: var(--transition); }
        .del-extra-btn:hover { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

        /* 批量导入导出面板 */
        .io-panel { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--border); }
        .io-panel.active { display: block; }
        .io-textarea { font-family: monospace; height: 100px; resize: vertical; margin-bottom: 10px; }

        /* 终端命令盒子 */
        .cmd-box { background: var(--terminal-bg); color: #e2e8f0; border-radius: var(--radius-md); border: 1px solid var(--terminal-border); overflow: hidden; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .cmd-box .cmd-header { display: flex; justify-content: space-between; align-items: center; background: var(--terminal-header); padding: 12px 20px; border-bottom: 1px solid var(--terminal-border); }
        .cmd-box .cmd-header span { font-weight: 600; font-size: 13px; color: #94a3b8; letter-spacing: 0.5px; }
        .cmd-box .btn-copy-all { background: #334155; border: none; color: #e2e8f0; padding: 5px 14px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500; cursor: pointer; transition: var(--transition); }
        .cmd-box .btn-copy-all:hover { background: #475569; color: #fff; }
        
        .cmd-holder { padding: 10px 20px; }
        .cmd-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 12px 0; border-bottom: 1px solid var(--terminal-border); gap: 16px; }
        .cmd-item:last-child { border-bottom: none; }
        .cmd-item .cmd-text { font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace; font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; flex: 1; color: #38bdf8; padding-top: 2px; }
        .cmd-item .cmd-copy-btn { background: #1e293b; border: 1px solid #334155; color: #94a3b8; padding: 4px 12px; border-radius: var(--radius-sm); font-size: 11px; font-weight: 500; cursor: pointer; flex-shrink: 0; transition: var(--transition); }
        .cmd-item .cmd-copy-btn:hover { background: #334155; color: #fff; border-color: #475569; }
        .cmd-empty { color: #475569; font-style: italic; font-size: 13px; text-align: center; padding: 20px 0; width: 100%; }

        .delete-section { border-top: 1px dashed var(--border); }
        .test-section { border-top: 1px dashed var(--border); }

        /* 隐藏的文件输入框 */
        #import-file-input { display: none; }

        @media (max-width: 768px) {
            body { padding: 16px 10px; }
            .container { padding: 20px; }
            .rule-fields { flex-direction: column; align-items: stretch; gap: 12px; }
            .rule-group { width: 100%; }
            .rule-group .input-combined { flex: 1; }
            .input-combined input.addr-field { flex: 1; width: auto; }
            .form-row { flex-direction: column; align-items: stretch; gap: 12px; }
            .form-row input[type="text"] { width: 100% !important; }
            .cmd-item { flex-direction: column; align-items: stretch; gap: 8px; }
            .cmd-item .cmd-copy-btn { align-self: flex-end; }
            .bal-container { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-area">
        <h1>🔁 Realm 规则生成器</h1>
        <div class="btn-group">
            <a href="https://github.com/hellooe/realm-x" target="_blank" class="btn btn-secondary btn-sm">🐈 GitHub 仓库</a>
            <button class="btn btn-secondary btn-sm" id="theme-toggle">🌓 切换主题</button>
        </div>
    </div>
    <div class="sub">可视化的 Realm 配置面板。</div>

    <div class="section">
        <div class="section-title">📦 管理 Realm 服务</div>
        <div class="btn-group">
            <button class="btn btn-warning" id="gen-install">⚙️ 安装 Realm</button>
            <button class="btn btn-primary" id="gen-update">🔄 更新 Realm</button>
            <button class="btn btn-danger" id="gen-uninstall">🗑️ 卸载 Realm</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title">🌐 全局网络配置</div>
        <div class="form-row">
            <label><input type="checkbox" id="enable_tcp" checked> 启用 TCP 协议</label>
            <label><input type="checkbox" id="enable_udp" checked> 启用 UDP 协议</label>
        </div>
    </div>

    <div class="section">
        <div class="section-title">
            <span>📋 配置转发规则</span>
            <div class="btn-group">
                <button class="btn btn-secondary btn-sm" id="toggle-io-btn">⚡ 批量粘贴/高级功能</button>
            </div>
        </div>

        <div class="io-panel" id="io-panel">
            <textarea class="io-textarea" id="bulk-paste-area" placeholder="【多行文本快捷解析导入】格式支持：&#10;监听端口:目标IP:目标端口(默认监听 0.0.0.0)&#10;监听IP:监听端口:目标IP:目标端口&#10;【注意】IPv6 地址需加方括号，如：&#10;10005:[2001:db8::1]:20005"></textarea>
            <div class="btn-group">
                <button class="btn btn-success btn-sm" id="btn-parse-bulk">解析并载入多行文本</button>
                <button class="btn btn-primary btn-sm" id="btn-export-json">导出备份 JSON 文件</button>
                <button class="btn btn-primary btn-sm" id="btn-import-json-trigger">导入 JSON 配置文件</button>
                <input type="file" id="import-file-input" accept=".json">
            </div>
        </div>

        <div id="rules-container" style="margin-top: 14px;"></div>
        <div style="margin-top: 16px;">
            <button class="btn btn-success" id="add-rule-btn">➕ 添加一条转发规则</button>
        </div>
        <div class="form-row" style="margin-top:16px; padding-top:12px; border-top: 1px solid var(--border);">
            <label><input type="checkbox" id="clear_rules" checked> 清空 realm 现有配置再添加</label>
        </div>
    </div>

    <div class="section delete-section">
        <div class="section-title">🗑️ 批量删除规则</div>
        <div class="form-row">
            <label style="flex-direction: column; align-items: flex-start; gap: 6px; width: 100%;">
                <span style="font-size: 13px; color: var(--text-muted);">输入要移除的监听端口（逗号分隔或连字符组合，如：10001,10002,20001-20002）</span>
                <input type="text" id="delete-port" placeholder="10001,20000-20010" style="max-width:400px;">
            </label>
        </div>
    </div>

    <div class="section test-section">
        <div class="section-title">🔍 测试与通知配置</div>
        <div class="form-row" style="margin-bottom: 16px;">
            <label style="flex: 1; min-width: 250px; flex-direction: column; align-items: flex-start; gap: 6px;">
                <span style="font-size: 13px; color: var(--text-muted);">Telegram Bot Token</span>
                <input type="text" id="tg_bot_token" placeholder="123456789:ABCdefGhI...">
            </label>
            <label style="flex: 1; min-width: 250px; flex-direction: column; align-items: flex-start; gap: 6px;">
                <span style="font-size: 13px; color: var(--text-muted);">Telegram Chat ID</span>
                <input type="text" id="tg_chat_id" placeholder="987654321 或 -100123456">
            </label>
        </div>
        <div class="form-row">
            <label style="flex-direction: column; align-items: flex-start; gap: 6px; width: 100%;">
                <span style="font-size: 13px; color: var(--text-muted);">自动连通性测试周期</span>
                <div style="display: flex; gap: 12px; align-items: center; width: 100%; max-width: 600px;">
                    <select id="cron_preset" style="max-width: 320px;">
                        <option value="none">暂不需要测试与通知</option>
                        <option value="once">仅执行单次测试 (不配置定时任务)</option>
                        <option value="hourly">每小时自动测试一次</option>
                        <option value="daily">每天自动测试一次</option>
                        <option value="weekly">每周自动测试一次</option>
                        <option value="custom">自定义测试周期</option>
                    </select>
                    <div id="custom_hours_wrapper" style="display: none; align-items: center; gap: 6px;">
                        <input type="text" id="custom_cron_hours" placeholder="6" style="width: 75px; text-align: center;">
                        <span style="font-size: 14px;">小时</span>
                    </div>
                </div>
            </label>
        </div>
    </div>

    <div style="margin-top:28px;">
        <div class="cmd-box" id="cmd-output">
            <div class="cmd-header">
                <span>TERMINAL COMMAND GENERATED</span>
                <button class="btn-copy-all" id="copy-all-btn">📋 复制全部指令</button>
            </div>
            <div class="cmd-holder" id="cmd-list">
                </div>
        </div>
    </div>
</div>

<script>
    (function() {
        let rules = [];
        let currentManagementCmd = '';

        const RULES_CONTAINER = document.getElementById('rules-container');
        const CMD_LIST = document.getElementById('cmd-list');

        const Validators = {
            port: (str) => {
                const p = parseInt(str.trim(), 10);
                return !isNaN(p) && p >= 1 && p <= 65535 && String(p) === str.trim();
            },
            addr: (str) => {
                return /^[a-zA-Z0-9\.\-_:\[\]]+$/.test(str.trim());
            },
            bulkPort: (str) => {
                return /^\d+(-\d+)?(,\d+(-\d+)?)*$/.test(str.trim());
            },
            weights: (str) => {
                return /^\d+(,\d+)*$/.test(str.trim());
            }
        };

        function checkInput(inputEl, validatorFunc, errorMsg) {
            if (!inputEl) return true;
            const val = inputEl.value.trim();
            
            if (!val) {
                inputEl.classList.remove('invalid-field');
                inputEl.title = '';
                return false; 
            }

            const isValid = validatorFunc(val);
            if (!isValid) {
                inputEl.classList.add('invalid-field');
                inputEl.title = errorMsg;
            } else {
                inputEl.classList.remove('invalid-field');
                inputEl.title = '';
            }
            return isValid;
        }

        // 初始化深浅主题
        const savedTheme = localStorage.getItem('realm_theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', savedTheme);

        document.getElementById('theme-toggle').addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('realm_theme', target);
        });

        document.getElementById('toggle-io-btn').addEventListener('click', () => {
            document.getElementById('io-panel').classList.toggle('active');
        });

        function joinAddrPort(addr, port) {
            addr = addr.trim();
            port = port.trim();
            if (!addr) return '';
            if (!port) return addr;
            if (addr.includes(':') && !addr.startsWith('[')) return `[${addr}]:${port}`;
            return `${addr}:${port}`;
        }

        // 本地自动保存
        function saveToLocalStorage() {
            localStorage.setItem('realm_rules_data', JSON.stringify(rules));
            localStorage.setItem('realm_setting_tcp', document.getElementById('enable_tcp').checked);
            localStorage.setItem('realm_setting_udp', document.getElementById('enable_udp').checked);
            localStorage.setItem('realm_setting_clear', document.getElementById('clear_rules').checked);
            localStorage.setItem('realm_setting_del_port', document.getElementById('delete-port').value);
            localStorage.setItem('realm_setting_tg_token', document.getElementById('tg_bot_token').value);
            localStorage.setItem('realm_setting_tg_chat_id', document.getElementById('tg_chat_id').value);
            localStorage.setItem('realm_setting_cron_preset', document.getElementById('cron_preset').value);
            localStorage.setItem('realm_setting_cron_hours', document.getElementById('custom_cron_hours').value);
        }

        // 恢复本地存储数据
        function loadFromLocalStorage() {
            try {
                const storedRules = localStorage.getItem('realm_rules_data');
                if (storedRules) rules = JSON.parse(storedRules);
                
                if(localStorage.getItem('realm_setting_tcp') !== null) 
                    document.getElementById('enable_tcp').checked = localStorage.getItem('realm_setting_tcp') === 'true';
                if(localStorage.getItem('realm_setting_udp') !== null) 
                    document.getElementById('enable_udp').checked = localStorage.getItem('realm_setting_udp') === 'true';
                if(localStorage.getItem('realm_setting_clear') !== null) 
                    document.getElementById('clear_rules').checked = localStorage.getItem('realm_setting_clear') === 'true';
                if(localStorage.getItem('realm_setting_del_port') !== null) 
                    document.getElementById('delete-port').value = localStorage.getItem('realm_setting_del_port');
                if(localStorage.getItem('realm_setting_tg_token') !== null) 
                    document.getElementById('tg_bot_token').value = localStorage.getItem('realm_setting_tg_token');
                if(localStorage.getItem('realm_setting_tg_chat_id') !== null) 
                    document.getElementById('tg_chat_id').value = localStorage.getItem('realm_setting_tg_chat_id');
                if(localStorage.getItem('realm_setting_cron_preset') !== null) 
                    document.getElementById('cron_preset').value = localStorage.getItem('realm_setting_cron_preset');
                if(localStorage.getItem('realm_setting_cron_hours') !== null) 
                    document.getElementById('custom_cron_hours').value = localStorage.getItem('realm_setting_cron_hours');
                
                syncCustomHoursWrapper();
            } catch(e) {
                console.error("加载缓存数据失败", e);
            }
        }

        function syncCustomHoursWrapper() {
            const preset = document.getElementById('cron_preset').value;
            const wrapper = document.getElementById('custom_hours_wrapper');
            if (preset === 'custom') {
                wrapper.style.display = 'flex';
            } else {
                wrapper.style.display = 'none';
            }
        }

        function syncWeightsValidation(itemDiv, index) {
            const weightsInp = itemDiv.querySelector('.bal-weights');
            if (!weightsInp) return;

            let activeEndpointsCount = 0;
            if(Validators.addr(rules[index].remote_addr) && Validators.port(rules[index].remote_port)) activeEndpointsCount++;
            (rules[index].extra_remotes || []).forEach(item => {
                if (Validators.addr(item.addr) && Validators.port(item.port)) activeEndpointsCount++;
            });

            const isSyntaxValid = checkInput(weightsInp, Validators.weights, "权重格式错误！仅允许纯数字与英文逗号（如: 4,2,1）");
            if (isSyntaxValid) {
                const weightElements = weightsInp.value.split(',').map(w => w.trim()).filter(w => w !== '');
                if (weightElements.length !== activeEndpointsCount) {
                    weightsInp.classList.add('invalid-field');
                    weightsInp.title = `项数不配！当前填写的权重个数(${weightElements.length})与该条规则中真正合法的转发目标总数(${activeEndpointsCount})不一致，强行运行会导致 Realm 节点崩溃！`;
                }
            }
        }

        function renderRules() {
            RULES_CONTAINER.innerHTML = '';
            rules.forEach((rule, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'rule-item';

                const fieldsDiv = document.createElement('div');
                fieldsDiv.className = 'rule-fields';

                // 监听组
                const listenGroup = document.createElement('div');
                listenGroup.className = 'rule-group';
                
                const listenLabel = document.createElement('span');
                listenLabel.className = 'addr-label';
                listenLabel.textContent = '监听';
                
                const listenCombined = document.createElement('div');
                listenCombined.className = 'input-combined';
                
                const listenAddrInp = document.createElement('input');
                listenAddrInp.type = 'text';
                listenAddrInp.className = 'addr-field';
                listenAddrInp.value = rule.listen_addr || '0.0.0.0';
                listenAddrInp.placeholder = '0.0.0.0';
                
                const listenPortInp = document.createElement('input');
                listenPortInp.type = 'text';
                listenPortInp.className = 'port-field';
                listenPortInp.value = rule.listen_port || '';
                listenPortInp.placeholder = '端口';
                
                checkInput(listenPortInp, Validators.port, "端口格式错误！");
                checkInput(listenAddrInp, Validators.addr, "IP/域名包含非法字符！");

                listenCombined.appendChild(listenAddrInp);
                listenCombined.appendChild(listenPortInp);
                listenGroup.appendChild(listenLabel);
                listenGroup.appendChild(listenCombined);
                fieldsDiv.appendChild(listenGroup);

                // 远程组
                const remoteGroup = document.createElement('div');
                remoteGroup.className = 'rule-group';
                
                const remoteLabel = document.createElement('span');
                remoteLabel.className = 'addr-label';
                remoteLabel.textContent = '远程';
                
                const remoteCombined = document.createElement('div');
                remoteCombined.className = 'input-combined';
                
                const remoteAddrInp = document.createElement('input');
                remoteAddrInp.type = 'text';
                remoteAddrInp.className = 'addr-field';
                remoteAddrInp.value = rule.remote_addr || '';
                remoteAddrInp.placeholder = '目标 IP/域名';
                
                const remotePortInp = document.createElement('input');
                remotePortInp.type = 'text';
                remotePortInp.className = 'port-field';
                remotePortInp.value = rule.remote_port || '';
                remotePortInp.placeholder = '端口';
                
                checkInput(remotePortInp, Validators.port, "端口格式错误！");
                checkInput(remoteAddrInp, Validators.addr, "IP/域名包含非法字符！");

                remoteCombined.appendChild(remoteAddrInp);
                remoteCombined.appendChild(remotePortInp);
                remoteGroup.appendChild(remoteLabel);
                remoteGroup.appendChild(remoteCombined);
                fieldsDiv.appendChild(remoteGroup);

                itemDiv.appendChild(fieldsDiv);

                // 负载均衡模块
                const extraDiv = document.createElement('div');
                extraDiv.className = 'extra-remotes';

                const hasExtraCheck = rule._hasExtra || false;
                const extras = rule.extra_remotes || [];

                const checkLabel = document.createElement('label');
                checkLabel.style.cursor = 'pointer';
                checkLabel.style.fontSize = '13px';
                
                const checkBox = document.createElement('input');
                checkBox.type = 'checkbox';
                checkBox.checked = hasExtraCheck;
                checkBox.addEventListener('change', function() {
                    rules[index]._hasExtra = this.checked;
                    saveToLocalStorage();
                    renderRules();
                    updateAllCommands();
                });

                checkLabel.appendChild(checkBox);
                checkLabel.appendChild(document.createTextNode(' 开启多端负载均衡 (添加额外远程从节点)'));
                extraDiv.appendChild(checkLabel);

                const extraListDiv = document.createElement('div');
                extraListDiv.style.display = hasExtraCheck ? 'block' : 'none';
                extraListDiv.style.marginTop = '8px';

                const addExtraBtn = document.createElement('button');
                addExtraBtn.className = 'btn btn-secondary btn-sm';
                addExtraBtn.textContent = '➕ 添加多路由从节点';
                addExtraBtn.onclick = (e) => {
                    e.preventDefault();
                    if (!rules[index].extra_remotes) rules[index].extra_remotes = [];
                    rules[index].extra_remotes.push({ addr: '', port: '' });
                    rules[index]._hasExtra = true;
                    saveToLocalStorage();
                    renderRules();
                    updateAllCommands();
                };
                extraListDiv.appendChild(addExtraBtn);

                const extraItemContainer = document.createElement('div');
                extraItemContainer.className = 'extra-item-container';

                extras.forEach((item, ei) => {
                    const itemDivChild = document.createElement('div');
                    itemDivChild.className = 'extra-item';

                    const childCombined = document.createElement('div');
                    childCombined.className = 'input-combined';

                    const childAddrInp = document.createElement('input');
                    childAddrInp.type = 'text';
                    childAddrInp.className = 'addr-field';
                    childAddrInp.value = item.addr || '';
                    childAddrInp.placeholder = '从节点 IP';

                    const childPortInp = document.createElement('input');
                    childPortInp.type = 'text';
                    childPortInp.className = 'port-field';
                    childPortInp.value = item.port || '';
                    childPortInp.placeholder = '端口';

                    checkInput(childPortInp, Validators.port, "端口号格式错误！");
                    checkInput(childAddrInp, Validators.addr, "IP 包含非法字符！");

                    const delExtraBtn = document.createElement('button');
                    delExtraBtn.className = 'del-extra-btn';
                    delExtraBtn.textContent = '✕';
                    delExtraBtn.onclick = (e) => {
                        e.preventDefault();
                        rules[index].extra_remotes.splice(ei, 1);
                        if (rules[index].extra_remotes.length === 0) {
                            rules[index].balance = undefined;
                        }
                        saveToLocalStorage();
                        renderRules();
                        updateAllCommands();
                    };

                    const updateExtra = () => {
                        rules[index].extra_remotes[ei].addr = childAddrInp.value.trim();
                        rules[index].extra_remotes[ei].port = childPortInp.value.trim();
                        
                        checkInput(childPortInp, Validators.port, "端口号格式错误！");
                        checkInput(childAddrInp, Validators.addr, "IP 包含非法字符！");
                        syncWeightsValidation(itemDiv, index);

                        saveToLocalStorage();
                        updateAllCommands();
                    };
                    childAddrInp.addEventListener('input', updateExtra);
                    childPortInp.addEventListener('input', updateExtra);
                    
                    childAddrInp.addEventListener('keydown', handleEnterKey);
                    childPortInp.addEventListener('keydown', handleEnterKey);

                    childCombined.appendChild(childAddrInp);
                    childCombined.appendChild(childPortInp);
                    itemDivChild.appendChild(childCombined);
                    itemDivChild.appendChild(delExtraBtn);
                    extraItemContainer.appendChild(itemDivChild);
                });
                extraListDiv.appendChild(extraItemContainer);

                // 负载均衡策略组
                if (extras.length > 0) {
                    const balDiv = document.createElement('div');
                    balDiv.className = 'bal-container';
                    
                    const strategyVal = (rule.balance && rule.balance.strategy) || 'roundrobin';
                    const weightsVal = (rule.balance && rule.balance.weights) || '1';

                    balDiv.innerHTML = `
                        <label>轮询策略</label>
                        <select class="bal-strategy">
                            <option value="roundrobin">roundrobin (简单轮询)</option>
                            <option value="iphash">iphash (源IP固定哈希)</option>
                        </select>
                        <label style="margin-left:8px;">权重配置</label>
                        <input type="text" class="bal-weights" placeholder="1,1,1">
                    `;
                    
                    const strategySel = balDiv.querySelector('.bal-strategy');
                    strategySel.value = strategyVal;
                    const weightsInp = balDiv.querySelector('.bal-weights');
                    weightsInp.value = weightsVal;

                    let activeEndpointsCount = 0;
                    if(Validators.addr(rule.remote_addr) && Validators.port(rule.remote_port)) activeEndpointsCount++;
                    extras.forEach(item => {
                        if (Validators.addr(item.addr) && Validators.port(item.port)) activeEndpointsCount++;
                    });
                    const isSyntaxValid = checkInput(weightsInp, Validators.weights, "权重格式错误！仅允许纯数字与英文逗号（如: 4,2,1）");
                    if (isSyntaxValid) {
                        const weightElements = weightsInp.value.split(',').map(w => w.trim()).filter(w => w !== '');
                        if (weightElements.length !== activeEndpointsCount) {
                            weightsInp.classList.add('invalid-field');
                            weightsInp.title = `当前填写的权重个数(${weightElements.length})与该条规则中转发目标总数(${activeEndpointsCount})不一致，会导致 Realm 节点崩溃！`;
                        }
                    }

                    const updateBal = () => {
                        rules[index].balance = {
                            strategy: strategySel.value,
                            weights: weightsInp.value.trim() || '1'
                        };
                        
                        syncWeightsValidation(itemDiv, index);
                        saveToLocalStorage();
                        updateAllCommands();
                    };
                    strategySel.addEventListener('change', updateBal);
                    weightsInp.addEventListener('input', updateBal);

                    extraListDiv.appendChild(balDiv);
                }

                extraDiv.appendChild(extraListDiv);
                itemDiv.appendChild(extraDiv);

                const delBtn = document.createElement('button');
                delBtn.className = 'del-rule';
                delBtn.textContent = '✕ 移除此条映射';
                delBtn.onclick = () => {
                    rules.splice(index, 1);
                    saveToLocalStorage();
                    renderRules();
                    updateAllCommands();
                };
                itemDiv.appendChild(delBtn);

                const updateRule = () => {
                    rules[index].listen_addr = listenAddrInp.value.trim() || '0.0.0.0';
                    rules[index].listen_port = listenPortInp.value.trim();
                    rules[index].remote_addr = remoteAddrInp.value.trim();
                    rules[index].remote_port = remotePortInp.value.trim();
                    
                    checkInput(listenPortInp, Validators.port, "端口格式错误！");
                    checkInput(listenAddrInp, Validators.addr, "IP/域名包含非法字符！");
                    checkInput(remotePortInp, Validators.port, "端口格式错误！");
                    checkInput(remoteAddrInp, Validators.addr, "IP/域名包含非法字符！");
                    syncWeightsValidation(itemDiv, index);

                    saveToLocalStorage();
                    updateAllCommands();
                };

                listenAddrInp.addEventListener('input', updateRule);
                listenPortInp.addEventListener('input', updateRule);
                remoteAddrInp.addEventListener('input', updateRule);
                remotePortInp.addEventListener('input', updateRule);

                listenAddrInp.addEventListener('keydown', handleEnterKey);
                listenPortInp.addEventListener('keydown', handleEnterKey);
                remoteAddrInp.addEventListener('keydown', handleEnterKey);
                remotePortInp.addEventListener('keydown', handleEnterKey);

                RULES_CONTAINER.appendChild(itemDiv);
            });
        }

        function handleEnterKey(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('add-rule-btn').click();
                setTimeout(() => {
                    const allPortFields = RULES_CONTAINER.querySelectorAll('.port-field');
                    if (allPortFields.length > 0) {
                        allPortFields[allPortFields.length - 1].focus();
                    }
                }, 50);
            }
        }

        document.getElementById('add-rule-btn').addEventListener('click', () => {
            rules.push({
                listen_addr: '0.0.0.0',
                listen_port: '',
                remote_addr: '',
                remote_port: '',
                extra_remotes: [],
                _hasExtra: false,
                balance: undefined
            });
            saveToLocalStorage();
            renderRules();
            updateAllCommands();
        });

        function generateAddCommand() {
            const includeClear = document.getElementById('clear_rules').checked;
            const enableTcp = document.getElementById('enable_tcp').checked;
            const enableUdp = document.getElementById('enable_udp').checked;

            const validRules = rules.filter(r => {
                const listen = joinAddrPort(r.listen_addr, r.listen_port);
                const remote = joinAddrPort(r.remote_addr, r.remote_port);
                return listen && remote && Validators.port(r.listen_port) && Validators.port(r.remote_port) && Validators.addr(r.listen_addr) && Validators.addr(r.remote_addr);
            });
            if (validRules.length === 0) return '';

            const endpoints = validRules.map(r => {
                const listen = joinAddrPort(r.listen_addr, r.listen_port);
                const remote = joinAddrPort(r.remote_addr, r.remote_port);
                const ep = { listen, remote };
                if (r.extra_remotes && r.extra_remotes.length > 0) {
                    const filtered = r.extra_remotes
                        .filter(item => item.addr && item.port && Validators.port(item.port) && Validators.addr(item.addr))
                        .map(item => joinAddrPort(item.addr, item.port));
                    if (filtered.length > 0) {
                        ep.extra_remotes = filtered;
                        
                        let activeCount = 1 + filtered.length; 
                        let wStr = (r.balance && r.balance.weights) ? r.balance.weights.trim() : '';
                        let wArr = wStr.split(',').filter(w=>w!=='');
                        
                        if (r.balance && Validators.weights(wStr) && wArr.length === activeCount) {
                            ep.balance = {
                                strategy: r.balance.strategy,
                                weights: r.balance.weights.split(',').map(w => parseInt(w.trim(), 10))
                            };
                        }
                    }
                }
                return ep;
            });
            const endpointsJson = JSON.stringify(endpoints);
            const clearFlag = includeClear ? 'true' : 'false';

            let envVars = `XM_ACTION=add XM_CLEAR=${clearFlag}`;
            envVars += ` ENABLE_TCP=${enableTcp} ENABLE_UDP=${enableUdp}`;
            envVars += ` XM_ADD_JSON='${endpointsJson}'`;
            return `${envVars} bash <(curl -Ls https://raw.githubusercontent.com/hellooe/realm-x/refs/heads/master/xm.sh)`;
        }

        function generateTestCmd() {
            const token = document.getElementById('tg_bot_token').value.trim();
            const chatId = document.getElementById('tg_chat_id').value.trim();
            const preset = document.getElementById('cron_preset').value;
            const customHours = document.getElementById('custom_cron_hours').value.trim();

            if (preset === 'none' && !token && !chatId) return '';

            let cronIntervalString = '';
            if (preset === 'hourly') cronIntervalString = '0 * * * *';
            else if (preset === 'daily') cronIntervalString = '0 0 * * *';
            else if (preset === 'weekly') cronIntervalString = '0 0 * * 0';
            else if (preset === 'custom') {
                const hoursNum = parseInt(customHours, 10);
                if (!isNaN(hoursNum) && hoursNum > 0) {
                    cronIntervalString = `0 */${hoursNum} * * *`;
                } else {
                    cronIntervalString = '0 */6 * * *'; 
                }
            }
            
            const notifyVal = (token && chatId) ? 'true' : 'false';

            return `XM_ACTION=test TG_BOT_TOKEN='${token}' TG_CHAT_ID='${chatId}' TG_NOTIFY='${notifyVal}' CRON_INTERVAL='${cronIntervalString}' bash <(curl -Ls https://raw.githubusercontent.com/hellooe/realm-x/refs/heads/master/xm.sh)`;
        }

        function generateDeleteCmd() {
            const portInput = document.getElementById('delete-port');
            const port = portInput.value.trim();
            if (!port) {
                portInput.classList.remove('invalid-field');
                return '';
            }
            
            if (!Validators.bulkPort(port)) {
                portInput.classList.add('invalid-field');
                portInput.title = "格式错误！仅支持纯数字、英文逗号或连字符组，不能含空格。";
                return ''; 
            } else {
                portInput.classList.remove('invalid-field');
                portInput.title = "";
            }
            
            return `XM_ACTION=delete XM_DELETE_PORT="${port}" bash <(curl -Ls https://raw.githubusercontent.com/hellooe/realm-x/refs/heads/master/xm.sh)`;
        }

        function generateActionCmd(action) {
            return `XM_ACTION=${action} bash <(curl -Ls https://raw.githubusercontent.com/hellooe/realm-x/refs/heads/master/xm.sh)`;
        }

        function updateAllCommands() {
            const addCmd = generateAddCommand();
            const delCmd = generateDeleteCmd();
            const testCmd = generateTestCmd();

            let items = [];
            if (currentManagementCmd) items.push({ label: '管理', cmd: currentManagementCmd });
            if (addCmd) items.push({ label: '添加', cmd: addCmd });
            if (testCmd) items.push({ label: '测试', cmd: testCmd });
            if (delCmd) items.push({ label: '删除', cmd: delCmd });

            if (items.length === 0) {
                CMD_LIST.innerHTML = '';
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'cmd-empty';
                emptyDiv.textContent = '💡 暂无生成的执行命令。请在上方输入完整的端口和映射数据，格式不正确或包含不符合白名单字符的数据会被安全过滤。';
                CMD_LIST.appendChild(emptyDiv);
                return;
            }

            CMD_LIST.innerHTML = '';
            items.forEach((item) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'cmd-item';

                const textSpan = document.createElement('span');
                textSpan.className = 'cmd-text';
                textSpan.textContent = item.cmd;

                const copyBtn = document.createElement('button');
                copyBtn.className = 'cmd-copy-btn';
                copyBtn.innerHTML = '📋 复制';
                copyBtn.setAttribute('data-raw-cmd', item.cmd);
                copyBtn.addEventListener('click', function() {
                    copyToClipboard(this.getAttribute('data-raw-cmd'), this);
                });

                itemDiv.appendChild(textSpan);
                itemDiv.appendChild(copyBtn);
                CMD_LIST.appendChild(itemDiv);
            });
        }

        function copyToClipboard(text, element) {
            const doVisualFeedback = () => {
                if (element) {
                    const originText = element.innerHTML;
                    element.innerHTML = '✓ 已复制';
                    element.style.borderColor = 'var(--success)';
                    element.style.color = 'var(--success)';
                    setTimeout(() => {
                        element.innerHTML = originText;
                        element.style.borderColor = '';
                        element.style.color = '';
                    }, 1500);
                }
            };

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(doVisualFeedback).catch(() => fallbackCopy(text, doVisualFeedback));
            } else {
                fallbackCopy(text, doVisualFeedback);
            }
        }

        function fallbackCopy(text, callback) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try { document.execCommand('copy'); callback(); } catch (err) { console.error('复制失败', err); }
            document.body.removeChild(textarea);
        }

        document.getElementById('btn-parse-bulk').addEventListener('click', () => {
            const rawText = document.getElementById('bulk-paste-area').value.trim();
            if(!rawText) return;

            const lines = rawText.split('\n');
            let newlyAddedCount = 0;

            lines.forEach(line => {
                const cleanLine = line.trim();
                if(!cleanLine) return;
                
                const segments = cleanLine.split(/:(?![^\[]*\])/);
                if(segments.length === 3) {
                    let remote = segments[1].trim();
                    if (remote.startsWith('[') && remote.endsWith(']')) remote = remote.slice(1, -1);
                    
                    rules.push({
                        listen_addr: '0.0.0.0',
                        listen_port: segments[0].trim(),
                        remote_addr: remote,
                        remote_port: segments[2].trim(),
                        extra_remotes: [],
                        _hasExtra: false,
                        balance: undefined
                    });
                    newlyAddedCount++;
                } else if(segments.length === 4) {
                    let listen = segments[0].trim();
                    let remote = segments[2].trim();
                    if (listen.startsWith('[') && listen.endsWith(']')) listen = listen.slice(1, -1);
                    if (remote.startsWith('[') && remote.endsWith(']')) remote = remote.slice(1, -1);

                    rules.push({
                        listen_addr: listen,
                        listen_port: segments[1].trim(),
                        remote_addr: remote,
                        remote_port: segments[3].trim(),
                        extra_remotes: [],
                        _hasExtra: false,
                        balance: undefined
                    });
                    newlyAddedCount++;
                }
            });

            if(newlyAddedCount > 0) {
                document.getElementById('bulk-paste-area').value = '';
                document.getElementById('io-panel').classList.remove('active');
                saveToLocalStorage();
                renderRules();
                updateAllCommands();
            } else {
                alert('未识别到任何有效映射。格式模板：\nIPv4 -> 80:1.1.1.1:80\nIPv6 -> 80:[2001:db8::1]:80');
            }
        });

        document.getElementById('btn-export-json').addEventListener('click', () => {
            if(rules.length === 0) { alert('当前没有配置可供导出备份'); return; }
            const blob = new Blob([JSON.stringify(rules, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const downloadAnchor = document.createElement('a');
            downloadAnchor.href = url;
            downloadAnchor.download = `realm_rules_backup_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            document.body.removeChild(downloadAnchor);
            URL.revokeObjectURL(url);
        });

        const fileInput = document.getElementById('import-file-input');
        document.getElementById('btn-import-json-trigger').addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const parsed = JSON.parse(evt.target.result);
                    if (Array.isArray(parsed)) {
                        rules = parsed;
                        saveToLocalStorage();
                        renderRules();
                        updateAllCommands();
                        document.getElementById('io-panel').classList.remove('active');
                        alert('JSON 配置导入还原成功！');
                    } else {
                        alert('解析失败：备份内容必须为合规的 JSON 数组结构。');
                    }
                } catch(err) {
                    alert('导入失败，请确保该文件为标准的纯文本 JSON 数据。');
                }
            };
            reader.readAsText(file);
            fileInput.value = '';
        });

        document.getElementById('clear_rules').addEventListener('change', () => { saveToLocalStorage(); updateAllCommands(); });
        document.getElementById('enable_tcp').addEventListener('change', () => { saveToLocalStorage(); updateAllCommands(); });
        document.getElementById('enable_udp').addEventListener('change', () => { saveToLocalStorage(); updateAllCommands(); });
        document.getElementById('delete-port').addEventListener('input', () => { saveToLocalStorage(); updateAllCommands(); });
        
        document.getElementById('tg_bot_token').addEventListener('input', () => { saveToLocalStorage(); updateAllCommands(); });
        document.getElementById('tg_chat_id').addEventListener('input', () => { saveToLocalStorage(); updateAllCommands(); });
        
        document.getElementById('cron_preset').addEventListener('change', () => { 
            syncCustomHoursWrapper(); 
            saveToLocalStorage(); 
            updateAllCommands(); 
        });
        document.getElementById('custom_cron_hours').addEventListener('input', () => { 
            saveToLocalStorage(); 
            updateAllCommands(); 
        });

        function handleManagementToggle(action) {
            const cmd = generateActionCmd(action);
            if (currentManagementCmd === cmd) currentManagementCmd = ''; 
            else currentManagementCmd = cmd; 
            updateAllCommands();
        }

        document.getElementById('gen-install').addEventListener('click', function() { handleManagementToggle('install'); });
        document.getElementById('gen-update').addEventListener('click', function() { handleManagementToggle('update'); });
        document.getElementById('gen-uninstall').addEventListener('click', function() { handleManagementToggle('uninstall'); });

        document.getElementById('copy-all-btn').addEventListener('click', function() {
            const cmdItems = document.querySelectorAll('.cmd-item .cmd-text');
            const texts = Array.from(cmdItems).map(el => el.textContent.trim());
            const fullText = texts.join('\n');
            if (fullText) copyToClipboard(fullText, this);
        });

        loadFromLocalStorage();
        renderRules();
        updateAllCommands();
    })();
</script>
</body>
</html>
